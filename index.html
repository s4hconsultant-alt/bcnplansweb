<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCN Plans — Barcelona sin filtros</title>
<meta name="description" content="Barcelona sin filtros. Entradas sin colas, guías insider y los mejores planes de la ciudad.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#0a0a0a;color:#f5f0e8;font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden}

/* ── Lang bar ── */
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:200;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 16px;background:linear-gradient(to bottom,rgba(5,5,5,0.9) 0%,transparent 100%)}
.lang-bar-logo{display:flex;justify-content:center}
.lang-bar-logo a{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid rgba(196,168,130,0.35);transition:border-color 0.2s,transform 0.2s}
.lang-bar-logo a:hover{border-color:#c4a882;transform:scale(1.07)}
.lang-bar-logo img{width:100%;height:100%;object-fit:cover}
.lang-bar-langs{display:flex;gap:2px;justify-content:flex-end}
.lang-bar-social{display:flex;align-items:center;gap:12px}
.social-icon{display:flex;align-items:center;color:rgba(245,240,232,0.35);text-decoration:none;transition:color 0.2s,filter 0.2s}
.social-icon:hover{color:#c4a882;filter:drop-shadow(0 0 6px rgba(196,168,130,0.5))}
.social-icon svg{width:17px;height:17px;fill:currentColor}
.lang-bar-langs{display:flex;gap:2px}
.lang-btn{background:transparent;border:none;color:rgba(245,240,232,0.4);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;padding:4px 10px;cursor:pointer;text-transform:uppercase;transition:color 0.2s;border-bottom:1px solid transparent}
.lang-btn:hover{color:rgba(245,240,232,0.75)}
.lang-btn.active{color:#c4a882;border-bottom-color:#c4a882}

/* ── Hero ── */
.hero{position:relative;width:100%;min-height:100svh;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.hero-img{position:absolute;inset:0;background-image:url(imagery/sagrada-interior.avif);background-size:cover;background-position:center 40%;will-change:transform}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,5,5,0.25) 0%,rgba(5,5,5,0.15) 35%,rgba(5,5,5,0.75) 70%,rgba(5,5,5,0.97) 100%)}
.hero-brand{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:2}
.hero-brand-logo{width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(196,168,130,0.5);overflow:hidden}
.hero-brand-logo img{width:100%;height:100%;object-fit:cover}
.hero-brand-handle{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(196,168,130,0.7)}
.hero-content{position:relative;z-index:2;padding:0 28px 56px}
.hero-eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(196,168,130,0.65);margin-bottom:14px;display:block}
.hero-h1{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(44px,11vw,72px);line-height:1.0;color:#f5f0e8;margin-bottom:16px;letter-spacing:-0.5px}
.hero-h1 em{font-style:italic;color:#c4a882}
.hero-sub{font-size:14px;line-height:1.65;color:rgba(245,240,232,0.65);max-width:340px;margin-bottom:32px;font-weight:300}
.hero-ctas{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.hero-btn{display:inline-block;background:#c4a882;color:#0a0a0a;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:13px 24px;text-decoration:none;transition:all 0.2s}
.hero-btn:hover{background:#9a7a5a;color:#f5f0e8;transform:translateY(-1px)}
.hero-scroll{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,0.45);text-decoration:none;transition:color 0.2s}
.hero-scroll:hover{color:#c4a882}
.hero-collab{position:absolute;bottom:56px;right:28px;z-index:2;font-size:10px;color:rgba(196,168,130,0.45);text-decoration:none;letter-spacing:0.5px;transition:color 0.2s;text-align:right;line-height:1.6}
.hero-collab:hover{color:#c4a882}
.hero-collab span{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(196,168,130,0.3);margin-bottom:2px}

/* Adjust hero-content when collab visible */
@media (min-width:420px){
  .hero-content{padding-right:140px}
}

/* ── Section base ── */
.section{width:100%;padding:60px 28px}
.section-dark{background:#0a0a0a}
.section-mid{background:#0d0d0d}
.section-cream{background:#f5f0e8}

/* ── Opener ── */
.opener{margin-bottom:36px}
.opener-eyebrow{display:block;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(196,168,130,0.55);margin-bottom:18px}
.opener-eyebrow-dark{color:rgba(10,10,10,0.35)}
.opener-quote{font-family:'Playfair Display',serif;font-size:clamp(19px,5vw,25px);color:#f5f0e8;line-height:1.45;font-style:italic;font-weight:400;margin-bottom:10px}
.opener-quote-dark{color:#0a0a0a}
.opener-cite{font-size:11px;color:rgba(196,168,130,0.55);letter-spacing:1px}
.opener-cite-dark{color:rgba(10,10,10,0.35)}
.opener-body{font-size:14px;color:rgba(0,0,0,0.55);line-height:1.65;font-weight:300}

/* ── Gold rule ── */
.gold-rule{width:36px;height:2px;background:#c4a882;margin-bottom:22px}

/* ── Feature card (Sagrada — full-width photo) ── */
.product-feature{width:100%;position:relative;overflow:hidden;margin-bottom:14px;cursor:pointer;display:block;text-decoration:none}
.product-feature-img{aspect-ratio:4/3;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;transition:transform 0.6s ease}
.product-feature:hover .product-feature-img{transform:scale(1.025)}
.product-feature-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,5,0.92) 0%,rgba(5,5,5,0.4) 45%,rgba(5,5,5,0.05) 100%)}
.product-feature-body{position:relative;z-index:1;padding:22px 22px 0;width:100%}
.product-tag{display:inline-block;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:#c4a882;margin-bottom:8px}
.product-title{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,7.5vw,40px);color:#f5f0e8;line-height:1.05;margin-bottom:14px}
.product-meta{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.product-price{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(22px,5.5vw,28px);color:#c4a882;line-height:1}
.product-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:10px;color:rgba(245,240,232,0.55);letter-spacing:0.3px}
.product-cta{display:flex;align-items:center;justify-content:space-between;background:#c4a882;padding:15px 20px;transition:background 0.2s}
.product-feature:hover .product-cta{background:#9a7a5a}
.product-cta-text{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#0a0a0a;letter-spacing:0.3px}
.product-feature:hover .product-cta-text{color:#f5f0e8}
.product-cta-arrow{color:#0a0a0a;font-size:16px;transition:transform 0.2s}
.product-feature:hover .product-cta-arrow{transform:translateX(4px);color:#f5f0e8}

/* ── Secondary grid (Park Güell + Casa Batlló) ── */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.product-card-sm{text-decoration:none;color:#f5f0e8;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:transform 0.25s;cursor:pointer}
.product-card-sm:hover{transform:translateY(-3px)}
.product-sm-img{aspect-ratio:2/3;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end}
.product-sm-img-dark{background:#080808;background-image:radial-gradient(ellipse at 50% 90%,rgba(196,168,130,0.14) 0%,transparent 65%);border:1px solid rgba(196,168,130,0.1)}
.product-sm-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,5,0.9) 0%,rgba(5,5,5,0.1) 55%,transparent 100%)}
.product-sm-body{position:relative;z-index:1;padding:14px 14px 0}
.product-sm-tag{display:block;font-size:7px;letter-spacing:3px;text-transform:uppercase;color:rgba(196,168,130,0.7);margin-bottom:5px}
.product-sm-title{font-family:'Playfair Display',serif;font-size:clamp(16px,4.5vw,20px);font-weight:700;color:#f5f0e8;line-height:1.15;margin-bottom:8px}
.product-sm-price{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(15px,4vw,19px);color:#c4a882}
.product-sm-cta{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border:1px solid rgba(196,168,130,0.15);border-top:none;padding:12px 14px;transition:all 0.2s}
.product-card-sm:hover .product-sm-cta{background:rgba(196,168,130,0.1);border-color:rgba(196,168,130,0.35)}
.product-sm-cta-text{font-size:11px;letter-spacing:0.5px;color:rgba(245,240,232,0.65)}
.product-sm-cta-arrow{color:#c4a882;font-size:13px;transition:transform 0.2s}
.product-card-sm:hover .product-sm-cta-arrow{transform:translateX(3px)}

/* ── Guides section (cream) ── */
.guides-header{margin-bottom:32px}
.guides-title{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(26px,7vw,36px);color:#0a0a0a;line-height:1.1;margin-bottom:8px}
.guides-title em{font-style:italic;color:#9a7a5a}
.guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.guide-card{background:#fff;padding:22px 18px 20px;text-decoration:none;color:#0a0a0a;position:relative;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,0.07);transition:transform 0.2s,box-shadow 0.2s}
.guide-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.guide-icon{font-size:26px;margin-bottom:12px}
.guide-badge{display:inline-block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;font-weight:500;font-family:'DM Sans',sans-serif;margin-bottom:12px;align-self:flex-start}
.guide-badge-pop{background:#0a0a0a;color:#c4a882}
.guide-badge-new{background:#c4a882;color:#0a0a0a}
.guide-name{font-family:'Playfair Display',serif;font-size:clamp(14px,3.8vw,17px);font-weight:700;color:#0a0a0a;line-height:1.25;margin-bottom:6px}
.guide-sub{font-size:11px;color:rgba(0,0,0,0.4);line-height:1.5;flex:1;margin-bottom:16px}
.guide-price{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,24px);font-weight:900;color:#9a7a5a}
.guide-arrow{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.guide-arrow-icon{color:#c4a882;font-size:13px;transition:transform 0.2s}
.guide-card:hover .guide-arrow-icon{transform:translateX(3px)}

/* ── Instagram section ── */
.section-insta{background:#050505;padding:70px 28px;text-align:center;border-top:1px solid rgba(196,168,130,0.08)}
.insta-eyebrow{display:block;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(196,168,130,0.45);margin-bottom:20px}
.insta-headline{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(26px,7vw,38px);color:#f5f0e8;line-height:1.15;margin-bottom:32px}
.insta-headline em{font-style:italic;color:#c4a882}
.btn-outline{display:inline-block;border:1px solid rgba(196,168,130,0.55);color:#c4a882;padding:14px 36px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.5px;text-decoration:none;transition:all 0.2s}
.btn-outline:hover{background:#c4a882;color:#0a0a0a;border-color:#c4a882}

/* ── Footer ── */
.footer{background:#050505;padding:44px 28px 40px;border-top:1px solid rgba(196,168,130,0.06)}
.footer-inner{max-width:480px;margin:0 auto}
.footer-divider{width:28px;height:1px;background:rgba(196,168,130,0.2);margin-bottom:28px}
.footer-contacts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.footer-contact-item{display:flex;flex-direction:column;gap:4px}
.footer-contact-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(196,168,130,0.35)}
.footer-contact-email{font-size:12px;color:rgba(245,240,232,0.5);text-decoration:none;transition:color 0.2s;letter-spacing:0.2px}
.footer-contact-email:hover{color:#c4a882}
.footer-legal{font-size:10px;color:rgba(245,240,232,0.18);letter-spacing:0.5px;line-height:1.8}
.footer-legal a{color:rgba(196,168,130,0.25);text-decoration:none;transition:color 0.2s}
.footer-legal a:hover{color:#c4a882}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.hero-eyebrow{animation:fadeUp 0.55s 0.1s ease both}
.hero-h1{animation:fadeUp 0.55s 0.2s ease both}
.hero-sub{animation:fadeUp 0.55s 0.3s ease both}
.hero-ctas{animation:fadeUp 0.55s 0.4s ease both}

/* ── Responsive tweaks ── */
@media(max-width:360px){
  .product-grid{grid-template-columns:1fr}
  .guide-grid{grid-template-columns:1fr}
  .footer-contacts{grid-template-columns:1fr}
}
@media(min-width:600px){
  body{display:flex;flex-direction:column;align-items:center}
  .lang-bar{max-width:520px;left:50%;transform:translateX(-50%);right:auto;width:100%;background:rgba(5,5,5,0.92)}
  .hero,.section,.section-insta,.footer{max-width:520px;width:100%}
  .hero-collab{right:auto;left:calc(50% + 140px);transform:translateX(0)}
}
</style>
</head>

/* ──────────────────────────────────────
   Lang switch
────────────────────────────────────── */
function _propagateLang(lang) {
  document.querySelectorAll('a[href]').forEach(function(a) {
    var h = a.getAttribute('href');
    if (!h || h.startsWith('http') || h.startsWith('mailto:') || h.startsWith('#') || h.startsWith('javascript:')) return;
    var qi = h.indexOf('?'), hi = h.indexOf('#');
    var path = qi >= 0 ? h.slice(0, qi) : (hi >= 0 ? h.slice(0, hi) : h);
    var hash = hi >= 0 ? h.slice(hi) : '';
    var query = qi >= 0 ? h.slice(qi + 1, hi >= 0 ? hi : undefined) : '';
    var parts = query ? query.split('&').filter(function(p){ return !p.startsWith('lang='); }) : [];
    parts.push('lang=' + lang);
    a.setAttribute('href', path + '?' + parts.join('&') + hash);
  });
}

function setLang(lang) {
  var t = T[lang] || T.es;

  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el) {
    var k = el.getAttribute('data-i18n-html');
    if (t[k] !== undefined) el.innerHTML = t[k];
  });

  document.querySelectorAll('.lang-btn').forEach(function(btn) { btn.classList.remove('active'); });
  var ab = document.querySelector('.lang-btn[onclick="setLang(\'' + lang + '\')"]');
  if (ab) ab.classList.add('active');

  document.documentElement.lang = lang;
  try { localStorage.setItem('bcnplans_lang', lang); } catch(e) {}
  try {
    var u = new URL(window.location.href);
    u.searchParams.set('lang', lang);
    window.history.replaceState({}, '', u.toString());
  } catch(e) {}
  _propagateLang(lang);
}

/* ──────────────────────────────────────
   Init
────────────────────────────────────── */
(function() {
  function init() {
    var lang = null;
    try { var u = new URL(window.location.href); var q = u.searchParams.get('lang'); if (q && T[q]) lang = q; } catch(e) {}
    if (!lang) { try { var s = localStorage.getItem('bcnplans_lang'); if (s && T[s]) lang = s; } catch(e) {} }
    if (!lang) { var bl = (navigator.language || 'es').slice(0, 2).toLowerCase(); lang = T[bl] ? bl : 'es'; }
    setLang(lang);

    /* subtle hero parallax on scroll */
    var heroImg = document.querySelector('.hero-img');
    if (heroImg && window.matchMedia('(prefers-reduced-motion: no-preference)').matches) {
      window.addEventListener('scroll', function() {
        var s = window.scrollY;
        heroImg.style.transform = 'translateY(' + (s * 0.3) + 'px)';
      }, { passive: true });
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
