<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCN Plans Map — La Barcelona que no sale en Google</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --cream: #F5F0E8;
    --dark: #1A1612;
    --dark-mid: #2C2520;
    --red: #C0392B;
    --text-muted: #8A7D6B;
    --panel-w: 380px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    position: relative;
    z-index: 100;
    background: var(--dark);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--cream);
  }
  .logo span { color: var(--gold); }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .header-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 4px 10px;
    border-radius: 2px;
  }

  .header-count {
    font-size: 11px;
    color: var(--text-muted);
  }
  .header-count strong { color: var(--gold); }

  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: var(--panel-w);
    background: var(--dark-mid);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 1px solid rgba(201,168,76,0.15);
    overflow: hidden;
  }

  .sidebar-top {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 5px;
  }
  .sidebar-title em { color: var(--gold); font-style: italic; }

  .sidebar-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  .filters {
    padding: 12px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 5px 11px;
    border-radius: 2px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 600;
  }

  .spots-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .spots-list::-webkit-scrollbar { width: 3px; }
  .spots-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.25); border-radius: 2px; }

  .spot-card {
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .spot-card:hover { background: rgba(201,168,76,0.06); }
  .spot-card.active { background: rgba(201,168,76,0.1); border-left: 2px solid var(--gold); padding-left: 18px; }

  .spot-icon {
    width: 34px;
    height: 34px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }

  .spot-info { flex: 1; min-width: 0; }

  .spot-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spot-barrio {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  .spot-tags { display: flex; gap: 3px; flex-wrap: wrap; }

  .tag {
    font-size: 9px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 1px;
    font-weight: 600;
  }
  .tag-gratis { background: rgba(39,174,96,0.18); color: #2ecc71; }
  .tag-local  { background: rgba(201,168,76,0.18); color: var(--gold); }
  .tag-secreto{ background: rgba(192,57,43,0.18); color: #e74c3c; }
  .tag-gastro { background: rgba(155,89,182,0.18); color: #a569bd; }
  .tag-vista  { background: rgba(41,128,185,0.18); color: #5dade2; }
  .tag-noche  { background: rgba(100,100,120,0.3); color: #aab; }
  .tag-verano { background: rgba(230,126,34,0.18); color: #f39c12; }
  .tag-cultura{ background: rgba(26,188,156,0.18); color: #1abc9c; }

  .spot-meta { text-align: right; flex-shrink: 0; }
  .spot-price { font-size: 11px; color: var(--cream); font-weight: 500; }

  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid rgba(201,168,76,0.15);
    background: rgba(201,168,76,0.04);
  }
  .footer-count {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 9px;
  }
  .footer-count strong { color: var(--gold); }
  .btn-maps {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--gold);
    color: var(--dark);
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-maps:hover { background: var(--gold-light); }

  #map {
    flex: 1;
    position: relative;
  }

  .detail-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--dark-mid);
    border-top: 1px solid rgba(201,168,76,0.3);
    padding: 18px 22px 20px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    z-index: 10;
    max-height: 52%;
    overflow-y: auto;
  }
  .detail-panel.open { transform: translateY(0); }
  .detail-panel::-webkit-scrollbar { width: 3px; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); }

  .detail-close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .detail-close:hover { color: var(--cream); }

  .detail-cat {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
  }
  .detail-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 3px;
    line-height: 1.15;
    padding-right: 30px;
  }
  .detail-barrio {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .detail-desc {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(245,240,232,0.82);
    margin-bottom: 12px;
  }
  .detail-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-bottom: 14px;
  }
  .info-item {
    background: rgba(255,255,255,0.04);
    padding: 9px 11px;
    border-radius: 2px;
  }
  .info-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .info-value { font-size: 12px; font-weight: 500; color: var(--cream); }

  .detail-tip {
    background: rgba(201,168,76,0.08);
    border-left: 2px solid var(--gold);
    padding: 9px 12px;
    border-radius: 0 2px 2px 0;
    font-size: 12px;
    color: rgba(245,240,232,0.75);
    line-height: 1.5;
    margin-bottom: 14px;
    font-style: italic;
  }
  .detail-tip strong { color: var(--gold); font-style: normal; }

  .detail-actions { display: flex; gap: 8px; }
  .btn-action {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-radius: 2px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary { background: var(--gold); color: var(--dark); }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-secondary { background: rgba(255,255,255,0.07); color: var(--cream); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }

  @media (max-width: 700px) {
    :root { --panel-w: 100vw; }
    .app-body { flex-direction: column; }
    .sidebar { width: 100%; height: 42vh; border-right: none; border-bottom: 1px solid rgba(201,168,76,0.15); }
    #map { height: 58vh; flex: none; }
    .header-count { display: none; }
  }


</style>
</head>
<body>

<!-- HEADER -->
<header>

  <div id="map">

    </div>
  </div>
</div>

let map, markers = [], activeFilter = 'todos', activeSpot = null;

function renderList(data) {
  const list = document.getElementById('spotsList');
  list.innerHTML = '';
  document.getElementById('countShown').textContent = data.length;
  document.getElementById('headerCount').textContent = data.length;

  data.forEach(spot => {
    const card = document.createElement('div');
    card.className = 'spot-card' + (activeSpot?.id === spot.id ? ' active' : '');
    card.dataset.id = spot.id;
    card.innerHTML = `
      <div class="spot-icon">${spot.emoji}</div>
      <div class="spot-info">
        <div class="spot-name">${spot.name}</div>
        <div class="spot-barrio">${spot.barrio}</div>
        <div class="spot-tags">${spot.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('')}</div>
      </div>
      <div class="spot-meta">
        <div class="spot-price">${spot.precio}</div>
      </div>`;
    card.onclick = (e) => selectSpot(spot, card);
    list.appendChild(card);
  });
}

function filterSpots(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = cat;
  const filtered = cat === 'todos' ? spots : spots.filter(s => s.cat === cat || s.tags.includes(cat));
  renderList(filtered);
  updateMarkers(filtered);
  closeDetail();
}

function selectSpot(spot, card) {
  activeSpot = spot;
  document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
  if (card) card.classList.add('active');

  if (map) {
    map.panTo({ lat: spot.lat, lng: spot.lng });
    map.setZoom(16);
  }

  document.getElementById('dCat').textContent = spot.tipo;
  document.getElementById('dName').textContent = spot.name;
  document.getElementById('dBarrio').textContent = `📍 ${spot.barrio}`;
  document.getElementById('dDesc').textContent = spot.desc;

  const tipEl = document.getElementById('dTip');
  if (spot.tip) {
    tipEl.innerHTML = `<strong>💡 Local tip:</strong> ${spot.tip}`;
    tipEl.style.display = 'block';
  } else {
    tipEl.style.display = 'none';
  }

  document.getElementById('dInfo').innerHTML = `
    <div class="info-item"><div class="info-label">Horario</div><div class="info-value">${spot.horario}</div></div>
    <div class="info-item"><div class="info-label">Precio</div><div class="info-value">${spot.precio}</div></div>`;

  document.getElementById('dActions').innerHTML = `
    <a class="btn-action btn-primary" href="${spot.maps}" target="_blank">Abrir en Google Maps →</a>
    <button class="btn-action btn-secondary" onclick="closeDetail()">Cerrar</button>`;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  activeSpot = null;
  document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
}

function updateMarkers(data) {
  markers.forEach(m => m.setMap(null));
  markers = [];
  data.forEach(spot => {
    const marker = new google.maps.Marker({
      position: { lat: spot.lat, lng: spot.lng },
      map,
      title: spot.name,
      label: { text: spot.emoji, fontSize: '16px' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 16,
        fillColor: '#C9A84C',
        fillOpacity: 0.12,
        strokeColor: '#C9A84C',
        strokeWeight: 1.5,
      }
    });
    marker.addListener('click', () => {
      const card = document.querySelector(`[data-id="${spot.id}"]`);
      selectSpot(spot, card);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    markers.push(marker);
  });
}

function initMap() {
  const darkStyle = [
    { elementType:'geometry', stylers:[{color:'#1a1612'}] },
    { elementType:'labels.text.stroke', stylers:[{color:'#1a1612'}] },
    { elementType:'labels.text.fill', stylers:[{color:'#8a7d6b'}] },
    { featureType:'administrative.locality', elementType:'labels.text.fill', stylers:[{color:'#c9a84c'}] },
    { featureType:'poi', elementType:'labels.text.fill', stylers:[{color:'#5a5248'}] },
    { featureType:'poi.park', elementType:'geometry', stylers:[{color:'#1e1c17'}] },
    { featureType:'road', elementType:'geometry', stylers:[{color:'#2c2520'}] },
    { featureType:'road', elementType:'geometry.stroke', stylers:[{color:'#1a1612'}] },
    { featureType:'road', elementType:'labels.text.fill', stylers:[{color:'#6b6356'}] },
    { featureType:'road.highway', elementType:'geometry', stylers:[{color:'#38312a'}] },
    { featureType:'road.highway', elementType:'labels.text.fill', stylers:[{color:'#8a7d6b'}] },
    { featureType:'transit', elementType:'geometry', stylers:[{color:'#2c2520'}] },
    { featureType:'transit.station', elementType:'labels.text.fill', stylers:[{color:'#c9a84c'}] },
    { featureType:'water', elementType:'geometry', stylers:[{color:'#0d1117'}] },
    { featureType:'water', elementType:'labels.text.fill', stylers:[{color:'#3a4a5a'}] },
  ];

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 41.3874, lng: 2.1686 },
    zoom: 14,
    styles: darkStyle,
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    gestureHandling: 'greedy',
  });

  renderList(spots);
  updateMarkers(spots);
}
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLtwz2xJ4NON6sApzjvTYwpO_zydi6-yU&callback=initMap"></script>
